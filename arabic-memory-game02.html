<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kartu Memori Bahasa Arab</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #1a1200;
    --dark2: #2a1e00;
    --dark3: #3a2c00;
    --cream: #fff8e7;
    --green: #2e7d32;
    --red: #c62828;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    background-image:
      radial-gradient(ellipse at 20% 20%, #3a2800 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a2a00 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  /* PATTERN BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M30 0l30 30-30 30L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 20px 0 16px;
  }

  .title-ar {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--gold);
    line-height: 1.2;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .title-id {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,248,231,0.5);
    margin-top: 4px;
  }

  /* ORNAMENT */
  .ornament {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    margin: 8px 0;
  }
  .ornament-line {
    height: 1px;
    width: 60px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .ornament-line.right { background: linear-gradient(to left, transparent, var(--gold)); }
  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 12px;
  }
  .stat-item { text-align: center; }
  .stat-val {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-lbl {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,248,231,0.4);
  }

  /* LEVEL SELECTOR */
  .level-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .level-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,248,231,0.5);
    font-family: 'Poppins', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .level-btn.active {
    background: linear-gradient(135deg, var(--gold), #8a6500);
    border-color: var(--gold);
    color: var(--dark);
    box-shadow: 0 0 12px rgba(201,168,76,0.3);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .grid.easy { grid-template-columns: repeat(3, 1fr); }
  .grid.hard { grid-template-columns: repeat(4, 1fr); }

  /* CARD */
  .card {
    aspect-ratio: 3/4;
    perspective: 800px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    border-radius: 10px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 4px;
  }

  /* BACK */
  .card-back {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow: var(--shadow);
  }
  .card-back::before {
    content: '✦';
    font-size: 1.5rem;
    color: rgba(201,168,76,0.3);
  }
  .card-back-pattern {
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 7px;
  }

  /* FRONT */
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #2a1800, #1a1000);
    border: 1.5px solid rgba(201,168,76,0.5);
    box-shadow: 0 0 16px rgba(201,168,76,0.15), var(--shadow);
  }

  .card.matched .card-front {
    border-color: var(--gold);
    background: linear-gradient(135deg, #2a2000, #1a1a00);
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .card-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    line-height: 1;
    text-align: center;
  }

  .card-divider {
    width: 30px;
    height: 1px;
    background: rgba(201,168,76,0.3);
    margin: 4px 0;
  }

  .card-indo {
    font-size: 0.55rem;
    color: rgba(255,248,231,0.6);
    text-align: center;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-type {
    font-size: 0.45rem;
    color: rgba(201,168,76,0.5);
    margin-top: 2px;
  }

  /* SHAKE */
  @keyframes shake {
    0%,100%{transform:rotateY(180deg) translateX(0)}
    25%{transform:rotateY(180deg) translateX(-4px)}
    75%{transform:rotateY(180deg) translateX(4px)}
  }
  .card.wrong .card-inner {
    animation: shake 0.4s ease;
    border-color: var(--red) !important;
  }
  .card.wrong .card-front { border-color: var(--red); }

  /* MATCHED PULSE */
  @keyframes matchPulse {
    0%,100%{box-shadow: 0 0 20px rgba(201,168,76,0.4)}
    50%{box-shadow: 0 0 30px rgba(201,168,76,0.7)}
  }
  .card.matched .card-front { animation: matchPulse 1s ease infinite; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 8px; }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), #7a5800);
    color: var(--dark);
    box-shadow: 0 4px 16px rgba(201,168,76,0.3);
  }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(135deg, #2a1e00, #1a1200);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    transform: scale(0.9);
    transition: transform 0.3s;
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal-icon { font-size: 3rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .modal-sub { font-size: 0.8rem; color: rgba(255,248,231,0.6); margin-bottom: 20px; }
  .modal-score {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
  }
  .modal-stat-val { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
  .modal-stat-lbl { font-size: 0.6rem; color: rgba(255,248,231,0.4); text-transform: uppercase; letter-spacing: 1px; }

  /* TIMER BAR */
  .timer-bar-wrap {
    height: 3px;
    background: rgba(201,168,76,0.15);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--gold);
    transition: width 1s linear, background 0.3s;
    border-radius: 2px;
  }

  /* MESSAGE */
  .message {
    text-align: center;
    font-size: 0.75rem;
    color: var(--gold);
    min-height: 20px;
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  @keyframes fadeIn {
    from{opacity:0;transform:translateY(-8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .message span { animation: fadeIn 0.3s ease; display: inline-block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-ar">بطاقات اللغة العربية</div>
    <div class="title-id">Kartu Memori Bahasa Arab</div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-val" id="scoreVal">0</div>
      <div class="stat-lbl">Skor</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="movesVal">0</div>
      <div class="stat-lbl">Langkah</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="matchVal">0/0</div>
      <div class="stat-lbl">Cocok</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="timerVal">60</div>
      <div class="stat-lbl">Detik</div>
    </div>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar" style="width:100%"></div>
  </div>

  <div class="level-bar">
    <button class="level-btn active" onclick="setLevel('easy')">🌙 Mudah</button>
    <button class="level-btn" onclick="setLevel('medium')">⭐ Sedang</button>
    <button class="level-btn" onclick="setLevel('hard')">🔥 Sulit</button>
  </div>

  <div class="message" id="message"><span>Pilih level & mulai bermain!</span></div>

  <div class="grid" id="grid"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">▶ Mulai Baru</button>
    <button class="btn btn-secondary" onclick="showVocab()">📖 Kosakata</button>
  </div>
</div>

<!-- WIN MODAL -->
<div class="modal-overlay" id="winModal">
  <div class="modal">
    <div class="modal-icon">🏆</div>
    <div class="modal-title">ممتاز!</div>
    <div class="modal-sub">Luar biasa! Kamu berhasil!</div>
    <div class="modal-score">
      <div>
        <div class="modal-stat-val" id="finalScore">0</div>
        <div class="modal-stat-lbl">Skor</div>
      </div>
      <div>
        <div class="modal-stat-val" id="finalMoves">0</div>
        <div class="modal-stat-lbl">Langkah</div>
      </div>
      <div>
        <div class="modal-stat-val" id="finalTime">0</div>
        <div class="modal-stat-lbl">Detik Sisa</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="closeModal();startGame()">Main Lagi</button>
      <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
    </div>
  </div>
</div>

<!-- LOSE MODAL -->
<div class="modal-overlay" id="loseModal">
  <div class="modal">
    <div class="modal-icon">⏰</div>
    <div class="modal-title">Waktu Habis!</div>
    <div class="modal-sub">Coba lagi, kamu pasti bisa!</div>
    <div class="modal-score">
      <div>
        <div class="modal-stat-val" id="loseScore">0</div>
        <div class="modal-stat-lbl">Skor</div>
      </div>
      <div>
        <div class="modal-stat-val" id="losePairs">0</div>
        <div class="modal-stat-lbl">Pasangan</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="closeModal();startGame()">Coba Lagi</button>
      <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
    </div>
  </div>
</div>

<!-- VOCAB MODAL -->
<div class="modal-overlay" id="vocabModal">
  <div class="modal" style="max-height:80vh;overflow-y:auto;max-width:360px">
    <div class="modal-title" style="margin-bottom:16px">📖 Kosakata</div>
    <div id="vocabList" style="text-align:left"></div>
    <br>
    <button class="btn btn-primary" onclick="closeModal()" style="width:100%">Tutup</button>
  </div>
</div>

<script>
const VOCAB = [
  // Anggota Tubuh
  {ar:'رَأْس', id:'Kepala', cat:'Tubuh'},
  {ar:'عَيْن', id:'Mata', cat:'Tubuh'},
  {ar:'أُذُن', id:'Telinga', cat:'Tubuh'},
  {ar:'يَد', id:'Tangan', cat:'Tubuh'},
  {ar:'قَلْب', id:'Jantung', cat:'Tubuh'},
  // Alam
  {ar:'شَمْس', id:'Matahari', cat:'Alam'},
  {ar:'قَمَر', id:'Bulan', cat:'Alam'},
  {ar:'نَجْم', id:'Bintang', cat:'Alam'},
  {ar:'مَاء', id:'Air', cat:'Alam'},
  {ar:'نَار', id:'Api', cat:'Alam'},
  // Keluarga
  {ar:'أَب', id:'Ayah', cat:'Keluarga'},
  {ar:'أُم', id:'Ibu', cat:'Keluarga'},
  {ar:'أَخ', id:'Saudara Laki', cat:'Keluarga'},
  {ar:'بَيْت', id:'Rumah', cat:'Umum'},
  // Ibadah
  {ar:'صَلاة', id:'Sholat', cat:'Ibadah'},
  {ar:'كِتَاب', id:'Kitab/Buku', cat:'Ibadah'},
  {ar:'مَسْجِد', id:'Masjid', cat:'Ibadah'},
  {ar:'دُعَاء', id:'Doa', cat:'Ibadah'},
  // Umum
  {ar:'طَعَام', id:'Makanan', cat:'Umum'},
  {ar:'مَدْرَسَة', id:'Sekolah', cat:'Umum'},
];

const LEVELS = {
  easy:   { pairs: 6,  time: 90,  timeBonus: 5,  matchBonus: 15 },
  medium: { pairs: 8,  time: 70,  timeBonus: 8,  matchBonus: 20 },
  hard:   { pairs: 10, time: 60,  timeBonus: 10, matchBonus: 25 },
};

let level = 'easy';
let cards = [], flipped = [], matched = 0, moves = 0, score = 0;
let timer = null, timeLeft = 0, totalPairs = 0, canFlip = true;

function setLevel(l) {
  level = l;
  document.querySelectorAll('.level-btn').forEach((b,i) => {
    b.classList.toggle('active', ['easy','medium','hard'][i] === l);
  });
  startGame();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame() {
  clearInterval(timer);
  const cfg = LEVELS[level];
  totalPairs = cfg.pairs;
  timeLeft = cfg.time;
  moves = 0; score = 0; matched = 0; flipped = []; canFlip = true;

  const pool = shuffle([...VOCAB]).slice(0, totalPairs);
  cards = shuffle([
    ...pool.map((v,i)=>({...v, id2: i, side:'ar'})),
    ...pool.map((v,i)=>({...v, id2: i, side:'id'}))
  ]);

  updateStats();
  renderGrid();
  startTimer();
  setMessage('Temukan pasangan kartu Arab & Artinya! 🌟');

  const g = document.getElementById('grid');
  g.className = 'grid ' + level;
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  cards.forEach((c, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="card-back-pattern"></div>
        </div>
        <div class="card-face card-front">
          ${c.side==='ar'
            ? `<div class="card-arabic">${c.ar}</div>
               <div class="card-divider"></div>
               <div class="card-type">${c.cat}</div>`
            : `<div class="card-arabic" style="font-size:0.9rem;font-family:'Poppins',sans-serif;color:var(--cream)">${c.id}</div>
               <div class="card-divider"></div>
               <div class="card-type">${c.cat}</div>`
          }
        </div>
      </div>`;
    el.addEventListener('click', () => flipCard(idx));
    g.appendChild(el);
  });
}

function flipCard(idx) {
  if(!canFlip) return;
  if(flipped.length >= 2) return;
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if(!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;

  el.classList.add('flipped');
  flipped.push(idx);

  if(flipped.length === 2) {
    moves++;
    updateStats();
    canFlip = false;
    setTimeout(checkMatch, 800);
  }
}

function checkMatch() {
  const [a, b] = flipped;
  const ca = cards[a], cb = cards[b];
  const elA = document.querySelector(`[data-idx="${a}"]`);
  const elB = document.querySelector(`[data-idx="${b}"]`);

  if(ca.id2 === cb.id2 && ca.side !== cb.side) {
    elA.classList.add('matched');
    elB.classList.add('matched');
    elA.classList.remove('flipped');
    elB.classList.remove('flipped');
    matched++;
    const cfg = LEVELS[level];
    score += cfg.matchBonus + Math.floor(timeLeft * 0.5);
    updateStats();
    setMessage(getRandomPraise());
    if(matched === totalPairs) {
      setTimeout(winGame, 500);
    }
  } else {
    elA.classList.add('wrong');
    elB.classList.add('wrong');
    setTimeout(() => {
      elA.classList.remove('flipped','wrong');
      elB.classList.remove('flipped','wrong');
    }, 600);
    score = Math.max(0, score - 3);
    updateStats();
    setMessage('Belum cocok, coba lagi! 💪');
  }

  flipped = [];
  canFlip = true;
}

function getRandomPraise() {
  const msgs = ['صَحِيح! Benar! 🌟','مُمْتَاز! Hebat! ✨','أَحْسَنْت! Bagus! 💛','نَعَم! Tepat! 🎯','بَارَكَ اللهُ! 🌙'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function startTimer() {
  const cfg = LEVELS[level];
  const bar = document.getElementById('timerBar');
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    const pct = (timeLeft / cfg.time) * 100;
    bar.style.width = pct + '%';
    bar.style.background = pct > 50 ? 'var(--gold)' : pct > 25 ? '#e0a000' : 'var(--red)';
    updateStats();
    if(timeLeft <= 0) {
      clearInterval(timer);
      loseGame();
    }
  }, 1000);
}

function updateStats() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('movesVal').textContent = moves;
  document.getElementById('matchVal').textContent = matched + '/' + totalPairs;
  document.getElementById('timerVal').textContent = timeLeft;
}

function setMessage(msg) {
  document.getElementById('message').innerHTML = `<span>${msg}</span>`;
}

function winGame() {
  clearInterval(timer);
  document.getElementById('finalScore').textContent = score + Math.floor(timeLeft * 2);
  document.getElementById('finalMoves').textContent = moves;
  document.getElementById('finalTime').textContent = timeLeft;
  document.getElementById('winModal').classList.add('show');
}

function loseGame() {
  document.getElementById('loseScore').textContent = score;
  document.getElementById('losePairs').textContent = matched;
  document.getElementById('loseModal').classList.add('show');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show'));
}

function showVocab() {
  const list = document.getElementById('vocabList');
  const cats = [...new Set(VOCAB.map(v=>v.cat))];
  list.innerHTML = cats.map(cat => `
    <div style="margin-bottom:12px">
      <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:6px">${cat}</div>
      ${VOCAB.filter(v=>v.cat===cat).map(v=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(201,168,76,0.1)">
          <span style="font-family:'Amiri',serif;font-size:1.2rem;color:var(--gold-light)">${v.ar}</span>
          <span style="font-size:0.75rem;color:rgba(255,248,231,0.7)">${v.id}</span>
        </div>`).join('')}
    </div>`).join('');
  document.getElementById('vocabModal').classList.add('show');
}

// Init
startGame();
</script>
